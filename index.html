<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- SEO & App Meta -->
    <title>Portli — Portfolio Intelligence</title>
    <meta name="description" content="Monitora il tuo portafoglio d'investimento con analisi AI in tempo reale. Azioni, ETF, crypto e cash in un'unica dashboard professionale." />
    <meta name="author" content="Portli" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Theme Colors -->
    <meta name="theme-color" content="#863bff" />
    <meta name="msapplication-TileColor" content="#070911" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96x96.png" />
    
    <!-- Apple PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Portli" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    
    <!-- Apple Splash Screens (iPhone / iPad) -->
    <!-- iPhone 15 Pro Max / 16 Plus (430x932) -->
    <link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone 15 / 16 (393x852) -->
    <link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/icons/icon-512x512.png" />
    <!-- iPhone SE / 8 (375x667) -->
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/icons/icon-384x384.png" />
    
    <!-- Prevent phone number/email auto-detection -->
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Portli — Portfolio Intelligence" />
    <meta property="og:description" content="Il tuo portafoglio d'investimento con analisi AI in tempo reale." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:locale" content="it_IT" />
    
    <!-- Preconnect to external services for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((reg) => {
              console.log('[Portli PWA] Service Worker registered:', reg.scope);
              
              // Check for updates periodically
              setInterval(() => {
                reg.update();
              }, 60 * 60 * 1000); // Every hour
            })
            .catch((err) => {
              console.warn('[Portli PWA] SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
